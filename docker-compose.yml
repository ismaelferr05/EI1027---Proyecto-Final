services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sgovi
      POSTGRES_USER: sgovi
      POSTGRES_PASSWORD: sgovi
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgovi -d sgovi"]
      interval: 3s
      timeout: 5s
      retries: 10
