<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Participante - SgOVI</title>
</head>
<body>
    <h1>Editar Participante</h1>
    <a href="/">Volver al inicio</a> | <a href="/participant-lists/list">Volver a Participantes</a>

    <form th:action="@{/participant-lists/edit}" th:object="${participantList}" method="post">
        <input type="hidden" th:field="*{idParticipantList}">
        <p>
            <label for="attendance">Asistencia:</label>
            <input type="checkbox" id="attendance" th:field="*{attendance}">
        </p>
        <p>
            <label for="attendanceCertificateUrl">URL del certificado de asistencia:</label>
            <input type="url" id="attendanceCertificateUrl" th:field="*{attendanceCertificateUrl}" maxlength="255">
        </p>
        <p>
            <label for="idActivity">ID Actividad:</label>
            <select id="idActivity" th:field="*{idActivity}" required>
                <option value="">Selecciona una actividad</option>
                <option th:each="activity : ${activities}" th:value="${activity.idActivity}" th:text="${activity.name}"></option>
            </select>
        </p>
        <p>
            <label for="idOviUser">ID Usuario OVI:</label>
            <select id="idOviUser" th:field="*{idOviUser}" required>
                <option value="">Selecciona un usuario OVI</option>
                <option th:each="oviUser : ${oviUsers}" th:value="${oviUser.idOviUser}" th:text="${oviUser.name}"></option>
            </select>
        </p>
        <p>
            <label for="idPapPati">ID PAP PATI:</label>
            <select id="idPapPati" th:field="*{idPapPati}" required>
                <option value="">Selecciona un PAP PATI</option>
                <option th:each="papPati : ${papPatis}" th:value="${papPati.idPapPati}" th:text="${papPati.phone}"></option>
            </select>
        </p>
        <p>
            <button type="submit">Actualizar</button>
            <a href="/participant-lists/list">Cancelar</a>
        </p>
    </form>
</body>
</html>
