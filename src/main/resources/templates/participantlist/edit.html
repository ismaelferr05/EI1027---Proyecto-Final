<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Editar participante</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
<main class="container">
    <h1>Edita participante</h1>
    <form th:action="@{/participant-lists/edit}" th:object="${participantList}" method="post">
        <input type="hidden" th:field="*{idParticipantList}" />

        <div class="mb-3 col-md-4">
            <label for="attendance" class="form-label">Asistencia:</label>
            <input id="attendance" type="checkbox" th:field="*{attendance}" class="form-check-input" />
            <div th:if="${#fields.hasErrors('attendance')}" th:errors="*{attendance}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="attendanceCertificateUrl" class="form-label">Certificado asistencia:</label>
            <input id="attendanceCertificateUrl" type="url" th:field="*{attendanceCertificateUrl}" class="form-control" maxlength="255" />
            <div th:if="${#fields.hasErrors('attendanceCertificateUrl')}" th:errors="*{attendanceCertificateUrl}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="idActivity" class="form-label">Actividad:</label>
            <select id="idActivity" th:field="*{idActivity}" class="form-control">
                <option value="">Selecciona una actividad</option>
                <option th:each="activity : ${activities}" th:value="${activity.idActivity}" th:text="${activity.name}"></option>
            </select>
            <div th:if="${#fields.hasErrors('idActivity')}" th:errors="*{idActivity}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="idOviUser" class="form-label">Usuario OVI:</label>
            <select id="idOviUser" th:field="*{idOviUser}" class="form-control">
                <option value="">Selecciona un usuario OVI</option>
                <option th:each="oviUser : ${oviUsers}" th:value="${oviUser.idOviUser}" th:text="|${oviUser.name} ${oviUser.lastName}|"></option>
            </select>
            <div th:if="${#fields.hasErrors('idOviUser')}" th:errors="*{idOviUser}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="idPapPati" class="form-label">PAP PATI:</label>
            <select id="idPapPati" th:field="*{idPapPati}" class="form-control">
                <option value="">Selecciona un PAP PATI</option>
                <option th:each="papPati : ${papPatis}" th:value="${papPati.idPapPati}" th:text="|${papPati.name} ${papPati.lastName}|"></option>
            </select>
            <div th:if="${#fields.hasErrors('idPapPati')}" th:errors="*{idPapPati}" class="text-danger"></div>
        </div>

        <button type="submit" class="btn btn-warning">Actualiza participante</button>
    </form>
</main>
</body>
</html>
