<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar PAP PATI - SgOVI</title>
</head>
<body>
    <h1>Editar PAP PATI</h1>
    <a href="/">Volver al inicio</a> | <a href="/pap-patis/list">Volver a PAP PATI</a>

    <form th:action="@{/pap-patis/edit}" th:object="${papPati}" method="post">
        <input type="hidden" th:field="*{idPapPati}">
        <p>
            <label for="name">Nombre:</label>
            <input type="text" id="name" th:field="*{name}" required maxlength="50">
        </p>
        <p>
            <label for="lastName">Apellidos:</label>
            <input type="text" id="lastName" th:field="*{lastName}" required maxlength="50">
        </p>
        <p>
            <label for="email">Email:</label>
            <input type="email" id="email" th:field="*{email}" required maxlength="100">
        </p>
        <p>
            <label for="phone">Teléfono:</label>
            <input type="tel" id="phone" th:field="*{phone}" required maxlength="20">
        </p>
        <p>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" th:field="*{password}" required maxlength="255">
        </p>
        <p>
            <label for="province">Provincia:</label>
            <input type="text" id="province" th:field="*{province}" maxlength="50">
        </p>
        <p>
            <label for="town">Ciudad:</label>
            <input type="text" id="town" th:field="*{town}" maxlength="50">
        </p>
        <p>
            <label for="pc">Código Postal:</label>
            <input type="text" id="pc" th:field="*{pc}" maxlength="10">
        </p>
        <p>
            <label for="age">Edad:</label>
            <input type="number" id="age" th:field="*{age}" min="0" max="150">
        </p>
        <p>
            <label for="gender">Género:</label>
            <select id="gender" th:field="*{gender}">
                <option value="">Selecciona un género</option>
                <option value="Masculino">Masculino</option>
                <option value="Femenino">Femenino</option>
                <option value="Otro">Otro</option>
            </select>
        </p>
        <p>
            <label for="cvUrl">URL CV:</label>
            <input type="url" id="cvUrl" th:field="*{cvUrl}" maxlength="255">
        </p>
        <p>
            <label for="training">Formación:</label>
            <input type="text" id="training" th:field="*{training}" maxlength="100">
        </p>
        <p>
            <label for="experience">Experiencia:</label>
            <input type="text" id="experience" th:field="*{experience}" maxlength="50">
        </p>
        <p>
            <label for="experienceType">Tipo de experiencia:</label>
            <input type="text" id="experienceType" th:field="*{experienceType}" maxlength="50">
        </p>
        <p>
            <label for="status">Estado:</label>
            <select id="status" th:field="*{status}" required>
                <option value="">Selecciona un estado</option>
                <option value="PENDING">PENDING</option>
                <option value="ACCEPTED">ACCEPTED</option>
                <option value="REJECTED">REJECTED</option>
            </select>
        </p>
        <p>
            <button type="submit">Actualizar</button>
            <a href="/pap-patis/list">Cancelar</a>
        </p>
    </form>
</body>
</html>
