<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar PAP PATI - SgOVI</title>
</head>
<body>
    <h1>Editar PAP PATI</h1>
    <a href="/">Volver al inicio</a> | <a href="/pap-patis/list">Volver a PAP PATI</a>

    <form th:action="@{/pap-patis/edit}" th:object="${papPati}" method="post">
        <input type="hidden" th:field="*{idPapPati}">
        <p>
            <label for="phone">Teléfono:</label>
            <input type="tel" id="phone" th:field="*{phone}" required>
        </p>
        <p>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" th:field="*{password}" required>
        </p>
        <p>
            <label for="province">Provincia:</label>
            <input type="text" id="province" th:field="*{province}" required>
        </p>
        <p>
            <label for="town">Ciudad:</label>
            <input type="text" id="town" th:field="*{town}" required>
        </p>
        <p>
            <label for="pc">Código Postal:</label>
            <input type="text" id="pc" th:field="*{pc}" required>
        </p>
        <p>
            <label for="age">Edad:</label>
            <input type="number" id="age" th:field="*{age}" required>
        </p>
        <p>
            <label for="gender">Género:</label>
            <input type="text" id="gender" th:field="*{gender}" required>
        </p>
        <p>
            <label for="cvUrl">URL CV:</label>
            <input type="url" id="cvUrl" th:field="*{cvUrl}">
        </p>
        <p>
            <label for="training">Formación:</label>
            <input type="text" id="training" th:field="*{training}">
        </p>
        <p>
            <label for="experience">Experiencia:</label>
            <input type="text" id="experience" th:field="*{experience}">
        </p>
        <p>
            <label for="experienceType">Tipo de Experiencia:</label>
            <input type="text" id="experienceType" th:field="*{experienceType}">
        </p>
        <p>
            <button type="submit">Actualizar</button>
            <a href="/pap-patis/list">Cancelar</a>
        </p>
    </form>
</body>
</html>
