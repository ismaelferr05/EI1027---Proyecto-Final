<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Formador - SgOVI</title>
</head>
<body>
    <h1>Agregar Nuevo Formador</h1>
    <a href="/">Volver al inicio</a> | <a href="/trainers/list">Volver a Formadores</a>

    <form th:action="@{/trainers/add}" th:object="${trainer}" method="post">
        <p>
            <label for="name">Nombre:</label>
            <input type="text" id="name" th:field="*{name}" required>
        </p>
        <p>
            <label for="occupation">Ocupación:</label>
            <input type="text" id="occupation" th:field="*{occupation}" required>
        </p>
        <p>
            <label for="lastName">Apellido:</label>
            <input type="text" id="lastName" th:field="*{lastName}" required>
        </p>
        <p>
            <label for="email">Email:</label>
            <input type="email" id="email" th:field="*{email}" required>
        </p>
        <p>
            <label for="phone">Teléfono:</label>
            <input type="tel" id="phone" th:field="*{phone}" required>
        </p>
        <p>
            <label for="address">Dirección:</label>
            <input type="text" id="address" th:field="*{address}" required>
        </p>
        <p>
            <button type="submit">Guardar</button>
            <a href="/trainers/list">Cancelar</a>
        </p>
    </form>
</body>
</html>
