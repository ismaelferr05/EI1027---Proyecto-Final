<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
   <meta charset="UTF-8" />
   <title>Crear nuevo formador</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
<main class="container">
   <h1>Nuevo formador</h1>
   <form class="form-horizontal" th:action="@{/trainers/add}" th:object="${trainer}" method="post">
       <div class="form-group row">
           <label for="name" class="control-label col-sm-2">Nombre:</label>
           <input id="name" type="text" th:field="*{name}" class="form-control col-sm-4" maxlength="50">
       </div>

       <div class="form-group row">
           <label for="lastName" class="control-label col-sm-2">Apellidos:</label>
           <input id="lastName" type="text" th:field="*{lastName}" class="form-control col-sm-4" maxlength="50">
       </div>

       <div class="form-group row">
           <label for="occupation" class="control-label col-sm-2">Ocupación:</label>
           <input id="occupation" type="text" th:field="*{occupation}" class="form-control col-sm-4" maxlength="100">
       </div>

       <div class="form-group row">
           <label for="email" class="control-label col-sm-2">Email:</label>
           <input id="email" type="email" th:field="*{email}" class="form-control col-sm-4" maxlength="100">
       </div>

       <div class="form-group row">
           <label for="phone" class="control-label col-sm-2">Teléfono:</label>
           <input id="phone" type="text" th:field="*{phone}" class="form-control col-sm-4" maxlength="20">
       </div>

       <div class="form-group row">
           <label for="address" class="control-label col-sm-2">Dirección:</label>
           <input id="address" type="text" th:field="*{address}" class="form-control col-sm-4" maxlength="150">
       </div>

       <button type="submit" class="btn btn-primary">Afegeix formador</button>
   </form>
</main>
</body>
</html>
