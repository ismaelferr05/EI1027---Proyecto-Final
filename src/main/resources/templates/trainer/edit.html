<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Formador - SgOVI</title>
</head>
<body>
    <h1>Editar Formador</h1>
    <a href="/">Volver al inicio</a> | <a href="/trainers/list">Volver a Formadores</a>

    <form th:action="@{/trainers/edit}" th:object="${trainer}" method="post">
        <input type="hidden" th:field="*{idTrainer}">

        <p th:if="${#fields.hasAnyErrors()}" style="color: red;">Revisa los campos marcados.</p>

        <p>
            <label for="name">Nombre:</label>
            <input type="text" id="name" th:field="*{name}" required maxlength="50">
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color: red;"></span>
        </p>
        <p>
            <label for="lastName">Apellido:</label>
            <input type="text" id="lastName" th:field="*{lastName}" required maxlength="50">
            <span th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" style="color: red;"></span>
        </p>
        <p>
            <label for="occupation">Ocupación:</label>
            <input type="text" id="occupation" th:field="*{occupation}" maxlength="100">
            <span th:if="${#fields.hasErrors('occupation')}" th:errors="*{occupation}" style="color: red;"></span>
        </p>
        <p>
            <label for="email">Email:</label>
            <input type="email" id="email" th:field="*{email}" required maxlength="100">
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: red;"></span>
        </p>
        <p>
            <label for="phone">Teléfono:</label>
            <input type="tel" id="phone" th:field="*{phone}" maxlength="20">
            <span th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" style="color: red;"></span>
        </p>
        <p>
            <label for="address">Dirección:</label>
            <input type="text" id="address" th:field="*{address}" maxlength="150">
            <span th:if="${#fields.hasErrors('address')}" th:errors="*{address}" style="color: red;"></span>
        </p>
        <p>
            <button type="submit">Actualizar</button>
            <a href="/trainers/list">Cancelar</a>
        </p>
    </form>
</body>
</html>
