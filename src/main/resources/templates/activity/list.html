<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividades - SgOVI</title>
</head>
<body>
    <h1>Listado de Actividades</h1>
    <a href="/">Volver al inicio</a> | <a href="/activities/add">Agregar Actividad</a>

    <table border="1" cellpadding="10">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Fecha</th>
                <th>Duración</th>
                <th>Localización</th>
                <th>Categoría</th>
                <th>Descripción</th>
                <th>ID Formador</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="activity : ${activities}">
                <td th:text="${activity.activity_id}"></td>
                <td th:text="${activity.name}"></td>
                <td th:text="${activity.date}"></td>
                <td th:text="${activity.duration}"></td>
                <td th:text="${activity.location}"></td>
                <td th:text="${activity.category}"></td>
                <td th:text="${activity.description}"></td>
                <td th:text="${activity.trainer_id}"></td>
                <td>
                    <a th:href="@{/activities/edit/{id}(id=${activity.activity_id})}">Editar</a>
                    <a th:href="@{/activities/delete/{id}(id=${activity.activity_id})}" onclick="return confirm('¿Confirmar eliminación?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
