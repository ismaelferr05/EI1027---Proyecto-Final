<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Editar actividad</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
<main class="container">
    <h1>Edita actividad</h1>
    <form th:action="@{/activities/edit}" th:object="${activity}" method="post">
        <input type="hidden" th:field="*{idActivity}" />

        <div class="mb-3 col-md-4">
            <label for="name" class="form-label">Nombre:</label>
            <input id="name" type="text" th:field="*{name}" class="form-control" maxlength="100" />
            <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="date" class="form-label">Fecha:</label>
            <input id="date" type="date" th:field="*{date}" class="form-control" />
            <div th:if="${#fields.hasErrors('date')}" th:errors="*{date}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="duration" class="form-label">Duración:</label>
            <input id="duration" type="number" th:field="*{duration}" class="form-control" min="1" step="1" />
            <div th:if="${#fields.hasErrors('duration')}" th:errors="*{duration}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="location" class="form-label">Localización:</label>
            <input id="location" type="text" th:field="*{location}" class="form-control" maxlength="150" />
            <div th:if="${#fields.hasErrors('location')}" th:errors="*{location}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="category" class="form-label">Categoría:</label>
            <input id="category" type="text" th:field="*{category}" class="form-control" maxlength="50" />
            <div th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="description" class="form-label">Descripción:</label>
            <textarea id="description" th:field="*{description}" class="form-control" maxlength="1000"></textarea>
            <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="idTrainer" class="form-label">Formador:</label>
            <select id="idTrainer" th:field="*{idTrainer}" class="form-control">
                <option value="">Selecciona un formador</option>
                <option th:each="trainer : ${trainers}" th:value="${trainer.idTrainer}" th:text="|${trainer.name} ${trainer.lastName}|"></option>
            </select>
            <div th:if="${#fields.hasErrors('idTrainer')}" th:errors="*{idTrainer}" class="text-danger"></div>
        </div>

        <button type="submit" class="btn btn-warning">Actualiza actividad</button>
    </form>
</main>
</body>
</html>
