<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
   <meta charset="UTF-8" />
   <title>Crear nueva actividad</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
<main class="container">
   <h1>Nueva actividad</h1>
   <form class="form-horizontal" th:action="@{/activities/add}" th:object="${activity}" method="post">
       <div class="form-group row">
           <label for="name" class="control-label col-sm-2">Nombre:</label>
           <input id="name" type="text" th:field="*{name}" class="form-control col-sm-4" maxlength="100">
       </div>

       <div class="form-group row">
           <label for="date" class="control-label col-sm-2">Fecha:</label>
           <input id="date" type="date" th:field="*{date}" class="form-control col-sm-4">
       </div>

       <div class="form-group row">
           <label for="duration" class="control-label col-sm-2">Duración:</label>
           <input id="duration" type="number" th:field="*{duration}" class="form-control col-sm-4" min="1" step="1">
       </div>

       <div class="form-group row">
           <label for="location" class="control-label col-sm-2">Localización:</label>
           <input id="location" type="text" th:field="*{location}" class="form-control col-sm-4" maxlength="150">
       </div>

       <div class="form-group row">
           <label for="category" class="control-label col-sm-2">Categoría:</label>
           <input id="category" type="text" th:field="*{category}" class="form-control col-sm-4" maxlength="50">
       </div>

       <div class="form-group row">
           <label for="description" class="control-label col-sm-2">Descripción:</label>
           <textarea id="description" th:field="*{description}" class="form-control col-sm-4" maxlength="1000"></textarea>
       </div>

       <div class="form-group row">
           <label for="idTrainer" class="control-label col-sm-2">Formador:</label>
           <select id="idTrainer" th:field="*{idTrainer}" class="form-control col-sm-4">
               <option value="">Selecciona un formador</option>
               <option th:each="trainer : ${trainers}" th:value="${trainer.idTrainer}" th:text="|${trainer.name} ${trainer.lastName}|"></option>
           </select>
       </div>

       <button type="submit" class="btn btn-primary">Afegeix activitat</button>
   </form>
</main>
</body>
</html>
