<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuario OVI - SgOVI</title>
</head>
<body>
    <h1>Editar Usuario OVI</h1>
    <a href="/">Volver al inicio</a> | <a href="/ovil-users/list">Volver a Usuarios OVI</a>

    <form th:action="@{/ovil-users/edit}" th:object="${ovilUser}" method="post">
        <input type="hidden" th:field="*{idOvilUser}">
        <p>
            <label for="name">Nombre:</label>
            <input type="text" id="name" th:field="*{name}" required>
        </p>
        <p>
            <label for="phone">Teléfono:</label>
            <input type="tel" id="phone" th:field="*{phone}" required>
        </p>
        <p>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" th:field="*{password}" required>
        </p>
        <p>
            <label for="province">Provincia:</label>
            <input type="text" id="province" th:field="*{province}" required>
        </p>
        <p>
            <label for="town">Ciudad:</label>
            <input type="text" id="town" th:field="*{town}" required>
        </p>
        <p>
            <label for="pc">Código Postal:</label>
            <input type="text" id="pc" th:field="*{pc}" required>
        </p>
        <p>
            <label for="age">Edad:</label>
            <input type="number" id="age" th:field="*{age}" required>
        </p>
        <p>
            <label for="gender">Género:</label>
            <input type="text" id="gender" th:field="*{gender}" required>
        </p>
        <p>
            <button type="submit">Actualizar</button>
            <a href="/ovil-users/list">Cancelar</a>
        </p>
    </form>
</body>
</html>
