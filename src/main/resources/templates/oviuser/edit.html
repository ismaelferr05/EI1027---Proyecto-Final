<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuario OVI - SgOVI</title>
</head>
<body>
    <h1>Editar Usuario OVI</h1>
    <a href="/">Volver al inicio</a> | <a href="/ovi-users/list">Volver a Usuarios OVI</a>

    <form th:action="@{/ovi-users/edit}" th:object="${oviUser}" method="post">
        <input type="hidden" th:field="*{idOviUser}">

        <p th:if="${#fields.hasAnyErrors()}" style="color: red;">Revisa los campos marcados.</p>

        <p>
            <label for="name">Nombre:</label>
            <input type="text" id="name" th:field="*{name}" required maxlength="50">
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color: red;"></span>
        </p>
        <p>
            <label for="phone">Teléfono:</label>
            <input type="tel" id="phone" th:field="*{phone}" required maxlength="20">
            <span th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" style="color: red;"></span>
        </p>
        <p>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" th:field="*{password}" required maxlength="255">
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: red;"></span>
        </p>
        <p>
            <label for="province">Provincia:</label>
            <input type="text" id="province" th:field="*{province}" required maxlength="50">
            <span th:if="${#fields.hasErrors('province')}" th:errors="*{province}" style="color: red;"></span>
        </p>
        <p>
            <label for="town">Ciudad:</label>
            <input type="text" id="town" th:field="*{town}" required maxlength="50">
            <span th:if="${#fields.hasErrors('town')}" th:errors="*{town}" style="color: red;"></span>
        </p>
        <p>
            <label for="pc">Código postal:</label>
            <input type="text" id="pc" th:field="*{pc}" required maxlength="10">
            <span th:if="${#fields.hasErrors('pc')}" th:errors="*{pc}" style="color: red;"></span>
        </p>
        <p>
            <label for="age">Edad:</label>
            <input type="number" id="age" th:field="*{age}" required min="0" max="150" step="1">
            <span th:if="${#fields.hasErrors('age')}" th:errors="*{age}" style="color: red;"></span>
        </p>
        <p>
            <label for="gender">Género:</label>
            <select id="gender" th:field="*{gender}" required>
                <option value="">Selecciona un género</option>
                <option value="Masculino">Masculino</option>
                <option value="Femenino">Femenino</option>
                <option value="Otro">Otro</option>
            </select>
            <span th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}" style="color: red;"></span>
        </p>
        <p>
            <button type="submit">Actualizar</button>
            <a href="/ovi-users/list">Cancelar</a>
        </p>
    </form>
</body>
</html>
