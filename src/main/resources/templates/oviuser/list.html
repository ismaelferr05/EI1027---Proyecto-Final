<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Usuarios OVI - SgOVI</title>
</head>
<body>
    <header>
        <h1>Listado de Usuarios OVI</h1>
        <nav aria-label="Acciones de listado">
            <a href="/">Volver al inicio</a> | <a href="/ovi-users/add">Agregar Usuario</a>
        </nav>
    </header>
    <main>
        <table border="1" cellpadding="10">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Provincia</th>
                <th>Ciudad</th>
                <th>Código Postal</th>
                <th>Edad</th>
                <th>Género</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="oviUser : ${oviUsers}">
                <td th:text="${oviUser.idOviUser}"></td>
                <td th:text="${oviUser.name}"></td>
                <td th:text="${oviUser.phone}"></td>
                <td th:text="${oviUser.province}"></td>
                <td th:text="${oviUser.town}"></td>
                <td th:text="${oviUser.pc}"></td>
                <td th:text="${oviUser.age}"></td>
                <td th:text="${oviUser.gender}"></td>
                <td>
                    <a th:href="@{/ovi-users/edit/{id}(id=${oviUser.idOviUser})}">Editar</a>
                    <a th:href="@{/ovi-users/delete/{id}(id=${oviUser.idOviUser})}" onclick="return confirm('¿Confirmar eliminación?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
        </table>
    </main>
</body>
</html>
