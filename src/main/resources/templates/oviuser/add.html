<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
   <meta charset="UTF-8" />
   <title>Crear nuevo usuario OVI</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
<main class="container">
   <h1>Nuevo usuario OVI</h1>
   <form class="form-horizontal" th:action="@{/ovi-users/add}" th:object="${oviUser}" method="post">
       <div class="mb-3 col-md-4">
           <label for="name" class="form-label">Nombre:</label>
           <input id="name" type="text" th:field="*{name}" class="form-control" maxlength="50">
           <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></div>
       </div>

       <div class="mb-3 col-md-4">
           <label for="lastName" class="form-label">Apellidos:</label>
           <input id="lastName" type="text" th:field="*{lastName}" class="form-control" maxlength="50">
           <div th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="text-danger"></div>
       </div>

       <div class="mb-3 col-md-4">
           <label for="email" class="form-label">Email:</label>
           <input id="email" type="email" th:field="*{email}" class="form-control" maxlength="100">
           <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></div>
       </div>

       <div class="mb-3 col-md-4">
           <label for="phone" class="form-label">Teléfono:</label>
           <input id="phone" type="text" th:field="*{phone}" class="form-control" maxlength="20">
           <div th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="text-danger"></div>
       </div>

       <div class="mb-3 col-md-4">
           <label for="password" class="form-label">Contraseña:</label>
           <input id="password" type="password" th:field="*{password}" class="form-control" maxlength="255">
           <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger"></div>
       </div>

       <div class="mb-3 col-md-4">
           <label for="province" class="form-label">Provincia:</label>
           <input id="province" type="text" th:field="*{province}" class="form-control" maxlength="50">
           <div th:if="${#fields.hasErrors('province')}" th:errors="*{province}" class="text-danger"></div>
       </div>

       <div class="mb-3 col-md-4">
           <label for="town" class="form-label">Población:</label>
           <input id="town" type="text" th:field="*{town}" class="form-control" maxlength="50">
           <div th:if="${#fields.hasErrors('town')}" th:errors="*{town}" class="text-danger"></div>
       </div>

       <div class="mb-3 col-md-4">
           <label for="pc" class="form-label">Código postal:</label>
           <input id="pc" type="text" th:field="*{pc}" class="form-control" maxlength="10">
           <div th:if="${#fields.hasErrors('pc')}" th:errors="*{pc}" class="text-danger"></div>
       </div>

       <div class="mb-3 col-md-4">
           <label for="age" class="form-label">Edad:</label>
           <input id="age" type="number" th:field="*{age}" class="form-control" min="0" step="1">
           <div th:if="${#fields.hasErrors('age')}" th:errors="*{age}" class="text-danger"></div>
       </div>

       <div class="mb-3 col-md-4">
           <label for="gender" class="form-label">Género:</label>
           <select id="gender" th:field="*{gender}" class="form-control">
               <option value="">Selecciona un género</option>
               <option value="Masculino">Masculino</option>
               <option value="Femenino">Femenino</option>
               <option value="Otro">Otro</option>
           </select>
           <div th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}" class="text-danger"></div>
       </div>

       <div class="mb-3 col-md-4">
           <label for="status" class="form-label">Estado:</label>
           <select id="status" th:field="*{status}" class="form-control">
               <option value="">Selecciona un estado</option>
               <option value="PENDING">PENDING</option>
               <option value="ACCEPTED">ACCEPTED</option>
               <option value="REJECTED">REJECTED</option>
           </select>
           <div th:if="${#fields.hasErrors('status')}" th:errors="*{status}" class="text-danger"></div>
       </div>

       <div class="mb-3 col-md-4">
           <label for="lopdConsent" class="form-label">Consentimiento LOPD:</label>
           <input id="lopdConsent" type="checkbox" th:field="*{lopdConsent}" class="form-check-input">
           <div th:if="${#fields.hasErrors('lopdConsent')}" th:errors="*{lopdConsent}" class="text-danger"></div>
       </div>

       <button type="submit" class="btn btn-primary">Afegeix usuari</button>
   </form>
</main>
</body>
</html>
