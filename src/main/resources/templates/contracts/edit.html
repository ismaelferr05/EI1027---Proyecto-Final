<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Editar contrato</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
<main class="container">
    <h1>Edita contrato</h1>
    <form th:action="@{/contracts/edit}" th:object="${contract}" method="post">
        <input type="hidden" th:field="*{idContract}" />

        <div class="mb-3 col-md-4">
            <label for="wage" class="form-label">Salario:</label>
            <input id="wage" type="number" th:field="*{wage}" class="form-control" min="0.01" step="0.01" />
            <div th:if="${#fields.hasErrors('wage')}" th:errors="*{wage}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="startDate" class="form-label">Fecha inicio:</label>
            <input id="startDate" type="date" th:field="*{startDate}" class="form-control" />
            <div th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="endDate" class="form-label">Fecha fin:</label>
            <input id="endDate" type="date" th:field="*{endDate}" class="form-control" />
            <div th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="url" class="form-label">URL:</label>
            <input id="url" type="text" th:field="*{url}" class="form-control" maxlength="255" />
            <div th:if="${#fields.hasErrors('url')}" th:errors="*{url}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="idNegotiation" class="form-label">Negociación:</label>
            <select id="idNegotiation" th:field="*{idNegotiation}" class="form-control">
                <option value="">Sin negociación</option>
                <option th:each="negotiation : ${negotiations}" th:value="${negotiation.idNegotiation}" th:text="${negotiation.stateOfApproval}"></option>
            </select>
            <div th:if="${#fields.hasErrors('idNegotiation')}" th:errors="*{idNegotiation}" class="text-danger"></div>
        </div>

        <button type="submit" class="btn btn-warning">Actualiza contrato</button>
    </form>
</main>
</body>
</html>
