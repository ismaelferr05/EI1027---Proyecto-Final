<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Contrato - SgOVI</title>
</head>
<body>
    <h1>Agregar Nuevo Contrato</h1>
    <a href="/">Volver al inicio</a> | <a href="/contracts/list">Volver a Contratos</a>

    <form th:action="@{/contracts/add}" th:object="${contract}" method="post">
        <p>
            <label for="wage">Salario:</label>
            <input type="number" id="wage" th:field="*{wage}" required min="0.01" step="0.01">
        </p>
        <p>
            <label for="startDate">Fecha Inicio:</label>
            <input type="date" id="startDate" th:field="*{startDate}" required>
        </p>
        <p>
            <label for="endDate">Fecha Fin:</label>
            <input type="date" id="endDate" th:field="*{endDate}" required>
        </p>
        <p>
            <label for="url">URL:</label>
            <input type="url" id="url" th:field="*{url}" required maxlength="255">
        </p>
        <p>
            <label for="idNegotiation">ID Negociación:</label>
            <select id="idNegotiation" th:field="*{idNegotiation}">
                <option value="">Sin negociación</option>
                <option th:each="negotiation : ${negotiations}" th:value="${negotiation.idNegotiation}" th:text="${negotiation.stateOfApproval}"></option>
            </select>
        </p>
        <p>
            <button type="submit">Guardar</button>
            <a href="/contracts/list">Cancelar</a>
        </p>
    </form>
</body>
</html>
