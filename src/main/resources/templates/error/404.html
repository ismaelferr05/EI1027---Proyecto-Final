<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Error - SgOVI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .error-container { text-align: center; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; }
        .error-code { font-size: 6rem; font-weight: 700; color: #667eea; line-height: 1; }
        .error-title { font-size: 1.8rem; font-weight: 600; color: #333; margin: 20px 0; }
        .error-message { color: #666; margin-bottom: 30px; font-size: 1.1rem; }
        .error-icon { font-size: 3rem; color: #667eea; margin-bottom: 20px; }
        .btn-custom { background-color: #667eea; color: white; padding: 12px 30px; border-radius: 5px; text-decoration: none; font-weight: 600; display: inline-block; }
        .btn-custom:hover { background-color: #5568d3; color: white; }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-icon"><i class="bi bi-exclamation-triangle"></i></div>
    <div class="error-code">404</div>
    <h1 class="error-title">Página no encontrada</h1>
    <p class="error-message">La ruta solicitada no existe en el sistema.</p>
    <a th:href="@{/}" class="btn-custom"><i class="bi bi-house"></i> Volver al inicio</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
