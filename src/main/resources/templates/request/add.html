<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Solicitud - SgOVI</title>
</head>
<body>
    <h1>Agregar Nueva Solicitud</h1>
    <a href="/">Volver al inicio</a> | <a href="/requests/list">Volver a Solicitudes</a>

    <form th:action="@{/requests/add}" th:object="${request}" method="post">
        <p>
            <label for="description">Descripción:</label>
            <textarea id="description" th:field="*{description}" required></textarea>
        </p>
        <p>
            <label for="training">Formación:</label>
            <input type="text" id="training" th:field="*{training}" maxlength="100">
        </p>
        <p>
            <label for="startDate">Fecha Inicio:</label>
            <input type="date" id="startDate" th:field="*{startDate}" required>
        </p>
        <p>
            <label for="endDate">Fecha Fin:</label>
            <input type="date" id="endDate" th:field="*{endDate}" required>
        </p>
        <p>
            <label for="experience">Experiencia:</label>
            <input type="number" id="experience" th:field="*{experience}" min="0" step="1">
        </p>
        <p>
            <label for="experienceType">Tipo de experiencia:</label>
            <input type="text" id="experienceType" th:field="*{experienceType}" maxlength="50">
        </p>
        <p>
            <label for="preferredGender">Género preferido:</label>
            <select id="preferredGender" th:field="*{preferredGender}">
                <option value="">Sin preferencia</option>
                <option value="Masculino">Masculino</option>
                <option value="Femenino">Femenino</option>
                <option value="Otro">Otro</option>
            </select>
        </p>
        <p>
            <label for="preferredPc">Código postal preferido:</label>
            <input type="text" id="preferredPc" th:field="*{preferredPc}" maxlength="10">
        </p>
        <p>
            <label for="preferredAge">Edad preferida:</label>
            <input type="number" id="preferredAge" th:field="*{preferredAge}" min="0" step="1">
        </p>
        <p>
            <label for="status">Estado:</label>
            <select id="status" th:field="*{status}" required>
                <option value="">Selecciona un estado</option>
                <option value="IN_REVIEW">IN_REVIEW</option>
                <option value="APPROVED">APPROVED</option>
                <option value="REJECTED">REJECTED</option>
                <option value="CONTRACT_ACTIVE">CONTRACT_ACTIVE</option>
                <option value="CONTRACT_FINISHED">CONTRACT_FINISHED</option>
            </select>
        </p>
        <p>
            <label for="idOviUser">ID Usuario OVI:</label>
            <select id="idOviUser" th:field="*{idOviUser}" required>
                <option value="">Selecciona un usuario OVI</option>
                <option th:each="oviUser : ${oviUsers}" th:value="${oviUser.idOviUser}" th:text="${oviUser.name}"></option>
            </select>
        </p>
        <p>
            <button type="submit">Guardar</button>
            <a href="/requests/list">Cancelar</a>
        </p>
    </form>
</body>
</html>
