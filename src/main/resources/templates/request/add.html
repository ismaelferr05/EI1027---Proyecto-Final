<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
   <meta charset="UTF-8" />
   <title>Crear solicitud</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
<main class="container">
   <h1>Nueva solicitud</h1>

   <form class="form-horizontal" th:action="@{/requests/add}" th:object="${request}" method="post">
       <div class="form-group row">
           <label for="description" class="control-label col-sm-2">Descripción:</label>
           <textarea id="description" th:field="*{description}" class="form-control col-sm-4"></textarea>
       </div>

       <div class="form-group row">
           <label for="training" class="control-label col-sm-2">Formación:</label>
           <input id="training" type="text" th:field="*{training}" class="form-control col-sm-4" maxlength="100">
       </div>

       <div class="form-group row">
           <label for="startDate" class="control-label col-sm-2">Fecha inicio:</label>
           <input id="startDate" type="date" th:field="*{startDate}" class="form-control col-sm-4">
       </div>

       <div class="form-group row">
           <label for="endDate" class="control-label col-sm-2">Fecha fin:</label>
           <input id="endDate" type="date" th:field="*{endDate}" class="form-control col-sm-4">
       </div>

       <div class="form-group row">
           <label for="experience" class="control-label col-sm-2">Experiencia:</label>
           <input id="experience" type="number" th:field="*{experience}" class="form-control col-sm-4" min="0" step="1">
       </div>

       <div class="form-group row">
           <label for="experienceType" class="control-label col-sm-2">Tipo experiencia:</label>
           <input id="experienceType" type="text" th:field="*{experienceType}" class="form-control col-sm-4" maxlength="50">
       </div>

       <div class="form-group row">
           <label for="preferredGender" class="control-label col-sm-2">Género preferido:</label>
           <select id="preferredGender" th:field="*{preferredGender}" class="form-control col-sm-4">
               <option value="">Sin preferencia</option>
               <option value="Masculino">Masculino</option>
               <option value="Femenino">Femenino</option>
               <option value="Otro">Otro</option>
           </select>
       </div>

       <div class="form-group row">
           <label for="preferredPc" class="control-label col-sm-2">CP preferido:</label>
           <input id="preferredPc" type="text" th:field="*{preferredPc}" class="form-control col-sm-4" maxlength="10">
       </div>

       <div class="form-group row">
           <label for="preferredAge" class="control-label col-sm-2">Edad preferida:</label>
           <input id="preferredAge" type="number" th:field="*{preferredAge}" class="form-control col-sm-4" min="0" step="1">
       </div>

       <div class="form-group row">
           <label for="status" class="control-label col-sm-2">Estado:</label>
           <select id="status" th:field="*{status}" class="form-control col-sm-4">
               <option value="">Selecciona un estado</option>
               <option value="IN_REVIEW">IN_REVIEW</option>
               <option value="APPROVED">APPROVED</option>
               <option value="REJECTED">REJECTED</option>
               <option value="CONTRACT_ACTIVE">CONTRACT_ACTIVE</option>
               <option value="CONTRACT_FINISHED">CONTRACT_FINISHED</option>
           </select>
       </div>

       <div class="form-group row">
           <label for="idOviUser" class="control-label col-sm-2">Usuario OVI:</label>
           <select id="idOviUser" th:field="*{idOviUser}" class="form-control col-sm-4">
               <option value="">Selecciona un usuario OVI</option>
               <option th:each="oviUser : ${oviUsers}" th:value="${oviUser.idOviUser}" th:text="|${oviUser.name} ${oviUser.lastName}|"></option>
           </select>
       </div>

       <button type="submit" class="btn btn-primary">Afegeix sol·licitud</button>
   </form>
</main>
</body>
</html>
