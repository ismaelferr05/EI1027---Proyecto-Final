<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Back-office - Revisar solicitud</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
<main class="container py-4">
    <h1 class="mb-3" th:text="|Revisar solicitud #${request.idRequest}|"></h1>

    <div class="alert alert-info" th:if="${msg != null}" th:text="${msg}"></div>

    <section class="mb-4">
        <h2 class="h5">Datos de la solicitud</h2>
        <dl class="row">
            <dt class="col-sm-3">Descripcion</dt>
            <dd class="col-sm-9" th:text="${request.description}"></dd>
            <dt class="col-sm-3">Periodo</dt>
            <dd class="col-sm-9" th:text="|${request.startDate} -> ${request.endDate}|"></dd>
            <dt class="col-sm-3">Preferencias</dt>
            <dd class="col-sm-9" th:text="|Genero: ${request.preferredGender} | CP: ${request.preferredPc} | Edad: ${request.preferredAge}|"></dd>
            <dt class="col-sm-3">Estado actual</dt>
            <dd class="col-sm-9"><span class="badge text-bg-secondary" th:text="${request.status}"></span></dd>
        </dl>
    </section>

    <section>
        <h2 class="h5">Propuesta de candidaturas (ordenada por afinidad)</h2>

        <form th:action="@{/requests/backoffice/approve}" method="post">
            <input type="hidden" name="idRequest" th:value="${request.idRequest}" />

            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle">
                    <thead>
                    <tr>
                        <th>Seleccion</th>
                        <th>PAP/PATI</th>
                        <th>CP</th>
                        <th>Genero</th>
                        <th>Edad</th>
                        <th>Puntuacion</th>
                        <th>Detalle</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(proposals)}">
                        <td colspan="7" class="text-center">No hay PAP/PATI disponibles para este periodo.</td>
                    </tr>
                    <tr th:each="proposal : ${proposals}">
                        <td>
                            <input type="checkbox"
                                   name="selectedPapPatiIds"
                                   th:value="${proposal.papPati.idPapPati}"
                                   th:disabled="${existingPapPatis.contains(proposal.papPati.idPapPati)}" />
                        </td>
                        <td th:text="|${proposal.papPati.name} ${proposal.papPati.lastName}|"></td>
                        <td th:text="${proposal.papPati.pc}"></td>
                        <td th:text="${proposal.papPati.gender}"></td>
                        <td th:text="${proposal.papPati.age}"></td>
                        <td><span class="badge text-bg-primary" th:text="${proposal.score}"></span></td>
                        <td>
                            <span th:text="${proposal.matchSummary}"></span>
                            <span class="text-muted" th:if="${existingPapPatis.contains(proposal.papPati.idPapPati)}"> (ya propuesto)</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Aprobar solicitud y enviar propuesta</button>
                <a href="/requests/backoffice/list" class="btn btn-outline-secondary">Volver al listado</a>
            </div>
        </form>

        <form th:action="@{/requests/backoffice/reject}" method="post" class="mt-3">
            <input type="hidden" name="idRequest" th:value="${request.idRequest}" />
            <button type="submit" class="btn btn-danger">Rechazar solicitud</button>
        </form>
    </section>
</main>
</body>
</html>
