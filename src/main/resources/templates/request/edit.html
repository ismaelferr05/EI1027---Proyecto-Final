<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Editar solicitud</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
<main class="container">
    <h1>Edita solicitud</h1>
    <form th:action="@{/requests/edit}" th:object="${request}" method="post">
        <input type="hidden" th:field="*{idRequest}" />

        <div class="mb-3 col-md-4">
            <label for="description" class="form-label">Descripción:</label>
            <textarea id="description" th:field="*{description}" class="form-control"></textarea>
            <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="training" class="form-label">Formación:</label>
            <input id="training" type="text" th:field="*{training}" class="form-control" maxlength="100" />
            <div th:if="${#fields.hasErrors('training')}" th:errors="*{training}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="startDate" class="form-label">Fecha inicio:</label>
            <input id="startDate" type="date" th:field="*{startDate}" class="form-control" />
            <div th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="endDate" class="form-label">Fecha fin:</label>
            <input id="endDate" type="date" th:field="*{endDate}" class="form-control" />
            <div th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="experience" class="form-label">Experiencia:</label>
            <input id="experience" type="number" th:field="*{experience}" class="form-control" min="0" step="1" />
            <div th:if="${#fields.hasErrors('experience')}" th:errors="*{experience}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="experienceType" class="form-label">Tipo experiencia:</label>
            <input id="experienceType" type="text" th:field="*{experienceType}" class="form-control" maxlength="50" />
            <div th:if="${#fields.hasErrors('experienceType')}" th:errors="*{experienceType}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="preferredGender" class="form-label">Género preferido:</label>
            <select id="preferredGender" th:field="*{preferredGender}" class="form-control">
                <option value="">Sin preferencia</option>
                <option value="Masculino">Masculino</option>
                <option value="Femenino">Femenino</option>
                <option value="Otro">Otro</option>
            </select>
            <div th:if="${#fields.hasErrors('preferredGender')}" th:errors="*{preferredGender}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="preferredPc" class="form-label">CP preferido:</label>
            <input id="preferredPc" type="text" th:field="*{preferredPc}" class="form-control" maxlength="10" />
            <div th:if="${#fields.hasErrors('preferredPc')}" th:errors="*{preferredPc}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="preferredAge" class="form-label">Edad preferida:</label>
            <input id="preferredAge" type="number" th:field="*{preferredAge}" class="form-control" min="0" step="1" />
            <div th:if="${#fields.hasErrors('preferredAge')}" th:errors="*{preferredAge}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="status" class="form-label">Estado:</label>
            <select id="status" th:field="*{status}" class="form-control">
                <option value="">Selecciona un estado</option>
                <option value="IN_REVIEW">IN_REVIEW</option>
                <option value="APPROVED">APPROVED</option>
                <option value="REJECTED">REJECTED</option>
                <option value="CONTRACT_ACTIVE">CONTRACT_ACTIVE</option>
                <option value="CONTRACT_FINISHED">CONTRACT_FINISHED</option>
            </select>
            <div th:if="${#fields.hasErrors('status')}" th:errors="*{status}" class="text-danger"></div>
        </div>

        <div class="mb-3 col-md-4">
            <label for="idOviUser" class="form-label">Usuario OVI:</label>
            <select id="idOviUser" th:field="*{idOviUser}" class="form-control">
                <option value="">Selecciona un usuario OVI</option>
                <option th:each="oviUser : ${oviUsers}" th:value="${oviUser.idOviUser}" th:text="|${oviUser.name} ${oviUser.lastName}|"></option>
            </select>
            <div th:if="${#fields.hasErrors('idOviUser')}" th:errors="*{idOviUser}" class="text-danger"></div>
        </div>

        <button type="submit" class="btn btn-warning">Actualiza solicitud</button>
    </form>
</main>
</body>
</html>
