<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Back-office - Revision de solicitudes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
<main class="container py-4">
    <h1 class="mb-3">Back-office: revision y propuestas</h1>
    <div class="mb-3">
        <a href="/" class="btn btn-link ps-0">Inicio</a>
        <a href="/requests/frontoffice/add" class="btn btn-outline-secondary">Front-office: nueva solicitud</a>
    </div>

    <h2 class="h4 mt-4">Solicitudes pendientes</h2>
    <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Descripcion</th>
                <th>Periodo</th>
                <th>Estado</th>
                <th>Accion</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(pendingRequests)}">
                <td colspan="5" class="text-center">No hay solicitudes en revision.</td>
            </tr>
            <tr th:each="request : ${pendingRequests}">
                <td th:text="${request.idRequest}"></td>
                <td th:text="${request.description}"></td>
                <td th:text="|${request.startDate} -> ${request.endDate}|"></td>
                <td><span class="badge text-bg-secondary" th:text="${request.status}"></span></td>
                <td>
                    <a class="btn btn-sm btn-primary" th:href="@{/requests/backoffice/review/{id}(id=${request.idRequest})}">Revisar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <h2 class="h4 mt-4">Solicitudes ya aprobadas</h2>
    <ul class="list-group" th:if="${!#lists.isEmpty(approvedRequests)}">
        <li class="list-group-item d-flex justify-content-between align-items-center" th:each="request : ${approvedRequests}">
            <span th:text="|#${request.idRequest} - ${request.description}|"></span>
            <a class="btn btn-sm btn-outline-primary" th:href="@{/requests/backoffice/review/{id}(id=${request.idRequest})}">Ver propuesta</a>
        </li>
    </ul>
    <p th:if="${#lists.isEmpty(approvedRequests)}" class="text-muted">Aun no hay solicitudes aprobadas.</p>
</main>
</body>
</html>
