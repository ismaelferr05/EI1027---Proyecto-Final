<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Front-office - Seguimiento</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
<main class="container py-4">
    <h1 class="mb-3">Seguimiento de solicitudes</h1>

    <form method="get" th:action="@{/requests/frontoffice/track}" class="row g-3 align-items-end">
        <div class="col-md-6">
            <label for="idOviUser" class="form-label">Persona usuaria</label>
            <select id="idOviUser" name="idOviUser" class="form-select" required>
                <option value="">Selecciona una persona</option>
                <option th:each="oviUser : ${oviUsers}"
                        th:value="${oviUser.idOviUser}"
                        th:selected="${selectedOviUser != null and selectedOviUser == oviUser.idOviUser}"
                        th:text="|${oviUser.name} ${oviUser.lastName}|"></option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Consultar</button>
        </div>
        <div class="col-md-4">
            <a href="/requests/frontoffice/add" class="btn btn-outline-secondary">Nueva solicitud</a>
            <a href="/" class="btn btn-link">Inicio</a>
        </div>
    </form>

    <div class="table-responsive mt-4" th:if="${selectedOviUser != null}">
        <table class="table table-striped table-bordered align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Descripcion</th>
                <th>Periodo</th>
                <th>Estado</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(requests)}">
                <td colspan="4" class="text-center">No hay solicitudes para esta persona.</td>
            </tr>
            <tr th:each="request : ${requests}">
                <td th:text="${request.idRequest}"></td>
                <td th:text="${request.description}"></td>
                <td th:text="|${request.startDate} -> ${request.endDate}|"></td>
                <td>
                    <span class="badge"
                          th:classappend="${request.status == 'APPROVED'} ? ' text-bg-success' : (${request.status == 'REJECTED'} ? ' text-bg-danger' : ' text-bg-secondary')"
                          th:text="${request.status}"></span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
