<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solicitudes - SgOVI</title>
</head>
<body>
    <h1>Listado de Solicitudes</h1>
    <a href="/">Volver al inicio</a> | <a href="/requests/add">Agregar Solicitud</a>

    <table border="1" cellpadding="10">
        <thead>
            <tr>
                <th>ID</th>
                <th>Descripción</th>
                <th>Formación</th>
                <th>Fecha Inicio</th>
                <th>Fecha Fin</th>
                <th>Experiencia</th>
                <th>ID Usuario OVI</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="request : ${requests}">
                <td th:text="${request.idRequest}"></td>
                <td th:text="${request.description}"></td>
                <td th:text="${request.training}"></td>
                <td th:text="${request.startDate}"></td>
                <td th:text="${request.endDate}"></td>
                <td th:text="${request.experience}"></td>
                <td th:text="${request.idOvilUser}"></td>
                <td>
                    <a th:href="@{/requests/edit/{id}(id=${request.idRequest})}">Editar</a>
                    <a th:href="@{/requests/delete/{id}(id=${request.idRequest})}" onclick="return confirm('¿Confirmar eliminación?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
