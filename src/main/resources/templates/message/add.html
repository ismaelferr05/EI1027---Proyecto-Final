<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
   <meta charset="UTF-8" />
   <title>Crear mensaje</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
<main class="container">
   <h1>Nuevo mensaje</h1>

   <form class="form-horizontal" th:action="@{/messages/add}" th:object="${message}" method="post">
       <div class="form-group row">
           <label for="messageDateTime" class="control-label col-sm-2">Fecha y hora:</label>
           <input id="messageDateTime" type="datetime-local" th:field="*{messageDateTime}" class="form-control col-sm-4">
       </div>

       <div class="form-group row">
           <label for="sender" class="control-label col-sm-2">Remitente:</label>
           <input id="sender" type="text" th:field="*{sender}" class="form-control col-sm-4" maxlength="20">
       </div>

       <div class="form-group row">
           <label for="receiver" class="control-label col-sm-2">Destinatario:</label>
           <input id="receiver" type="text" th:field="*{receiver}" class="form-control col-sm-4" maxlength="20">
       </div>

       <div class="form-group row">
           <label for="text" class="control-label col-sm-2">Texto:</label>
           <textarea id="text" th:field="*{text}" class="form-control col-sm-4" maxlength="300"></textarea>
       </div>

       <div class="form-group row">
           <label for="idNegotiation" class="control-label col-sm-2">Negociación:</label>
           <select id="idNegotiation" th:field="*{idNegotiation}" class="form-control col-sm-4">
               <option value="">Selecciona una negociación</option>
               <option th:each="negotiation : ${negotiations}" th:value="${negotiation.idNegotiation}" th:text="${negotiation.stateOfApproval}"></option>
           </select>
       </div>

       <button type="submit" class="btn btn-primary">Afegeix missatge</button>
   </form>
</main>
</body>
</html>
