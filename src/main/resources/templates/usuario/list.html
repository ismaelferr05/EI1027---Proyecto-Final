<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head><meta charset="UTF-8"><title>Usuarios OVI - SgOVI</title></head>
<body>
<h1>Usuarios OVI</h1>
<nav aria-label="Acciones">
    <a th:href="@{/usuarios/add}">Añadir usuario</a> |
    <a th:href="@{/}">Inicio</a>
</nav>
<br>
<table>
    <caption>Listado de usuarios</caption>
    <thead>
        <tr>
            <th scope="col">ID</th>
            <th scope="col">Nombre</th>
            <th scope="col">Apellidos</th>
            <th scope="col">Ciudad</th>
            <th scope="col">Email</th>
            <th scope="col">Estado</th>
            <th scope="col">Acciones</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="u : ${usuarios}">
            <td th:text="${u.idUsuario}"></td>
            <td th:text="${u.nombre}"></td>
            <td th:text="${u.apellidos}"></td>
            <td th:text="${u.ciudad}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.estado}"></td>
            <td>
                <a th:href="@{/usuarios/edit/{id}(id=${u.idUsuario})}">Editar</a> |
                <a th:href="@{/usuarios/delete/{id}(id=${u.idUsuario})}"
                   onclick="return confirm('¿Eliminar este usuario?')">Eliminar</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(usuarios)}">
            <td colspan="7">No hay usuarios registrados.</td>
        </tr>
    </tbody>
</table>
</body>
</html>
