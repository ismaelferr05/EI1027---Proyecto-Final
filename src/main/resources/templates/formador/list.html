<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head><meta charset="UTF-8"><title>Formadores - SgOVI</title></head>
<body>
<h1>Formadores</h1>
<nav aria-label="Acciones">
    <a th:href="@{/formador/add}">Añadir formador</a> |
    <a th:href="@{/}">Inicio</a>
</nav>
<br>
<table>
    <caption>Listado de formadores</caption>
    <thead>
        <tr>
            <th scope="col">ID</th>
            <th scope="col">Nombre</th>
            <th scope="col">Apellidos</th>
            <th scope="col">Ocupación</th>
            <th scope="col">Teléfono</th>
            <th scope="col">Email</th>
            <th scope="col">Acciones</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="f : ${formadores}">
            <td th:text="${f.idFormador}"></td>
            <td th:text="${f.nombre}"></td>
            <td th:text="${f.apellidos}"></td>
            <td th:text="${f.ocupacion}"></td>
            <td th:text="${f.telefono}"></td>
            <td th:text="${f.email}"></td>
            <td>
                <a th:href="@{/formador/edit/{id}(id=${f.idFormador})}">Editar</a> |
                <a th:href="@{/formador/delete/{id}(id=${f.idFormador})}"
                   onclick="return confirm('¿Eliminar este formador?')">Eliminar</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(formadores)}">
            <td colspan="7">No hay formadores registrados.</td>
        </tr>
    </tbody>
</table>
</body>
</html>
