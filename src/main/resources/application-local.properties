# In-memory DB for local runs (no VPN / no Docker required).
# For PostgreSQL instead: docker compose up -d, then uncomment the block below and comment the H2 lines.
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:sgovi;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

