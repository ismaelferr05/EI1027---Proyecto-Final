# =============================================================================
# CÓMO EJECUTAR LA APLICACIÓN (perfil local)
# =============================================================================
# 1. Instalar PostgreSQL (si no lo tienes): brew install postgresql@16
# 2. Iniciar PostgreSQL: brew services start postgresql@16
# 3. Crear la base de datos: createdb sgovi
# 4. Ajustar usuario/contraseña abajo (en macOS suele ser tu usuario, sin password)
# 5. Ejecutar: mvn spring-boot:run -Dspring-boot.run.profiles=local
# 6. Abrir en el navegador: http://localhost:8080
# =============================================================================

spring.datasource.url=jdbc:postgresql://localhost:5432/sgovi
# En macOS/Homebrew: usuario del sistema (whoami). Ej: ruben
spring.datasource.username=ruben
spring.datasource.password=
